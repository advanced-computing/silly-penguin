name: Scheduled ETL to BigQuery

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - feature/scheduled-etl
      - xiawuhao
  schedule:
    - cron: "0 9 * * *"

jobs:
  run-etl:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Show environment
        run: |
          python --version
          python -m pip --version
          uname -a

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxml2-dev \
            libxslt1-dev \
            zlib1g-dev \
            pkg-config \
            python3-dev \
            build-essential

      - name: Verify xml packages
        run: |
          dpkg -l | grep libxml2
          dpkg -l | grep libxslt
          which xslt-config || true
          xml2-config --version || true

      - name: Upgrade packaging tools
        run: |
          python -m pip install --upgrade pip setuptools wheel

      - name: Install lxml first
        run: |
          python -m pip install -v lxml==5.3.2

      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: "${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}"

      - name: Run ETL
        env:
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
          NREL_API_KEY: ${{ secrets.NREL_API_KEY }}
        run: |
          python load_to_bigquery.py
